services:
  odoo:
    image: odoo:18
    container_name: odoo-dev

    depends_on:
      - db

    ports:
      - "8069:8069"

    environment:
      - HOST=db
      - USER=odoo
      - PASSWORD=odoo123

    volumes:
      - ./custom-addons:/mnt/extra-addons
      - ./config:/etc/odoo

    restart: unless-stopped

  db:
    image: postgres:16
    container_name: postgres-dev

    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_USER=odoo
      - POSTGRES_PASSWORD=odoo123

    volumes:
      - ./postgres:/var/lib/postgresql/data

    restart: unless-stopped
